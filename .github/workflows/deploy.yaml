name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Build Docker image (IMPORTANT: use correct folder)
      # - name: Build Docker Image
      #   run: docker build -t my-app .

      # # 3. Run container
      # - name: Run Container
      #   run: docker run -d -p 8000:8000 --name my-container my-app

      # 4. Wait for server to start
      - name: Wait for app
        run: sleep 5

      # 5. Test API (THIS MAKES CI REAL)
      - name: Test API
        run: curl -f http://localhost:8000 || exit 1

      # 6. Show logs if failed (very useful)
      - name: Show container logs
        if: failure()
        run: docker logs my-container

      # 7. Stop container (cleanup)
      - name: Stop container
        if: always()
        run: docker stop my-container

      - name: Deploy to Render
        if: success()
        run: curl -X POST https://api.render.com/deploy/srv-d7pm7t28qa3s73c6vbag?key=xTKtOpxzQJw